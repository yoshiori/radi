    """Path to the temporary audio file returned by uploadEpisodeMedia"""
    audioPath: String!
    description: String
    episodeNumber: Int

    """Path to the temporary image file returned by uploadEpisodeMedia"""
    imagePath: String
    normalizeLoudness: Boolean
    podcastId: ID!
