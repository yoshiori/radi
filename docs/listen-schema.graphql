  createGuestStarring(episodeId: ID!, guestEmail: String, guestId: ID, guestName: String, imagePath: String, role: String!, speakers: [Int!]): Episode!
  createPodcast(author: String!, category: PodcastCategoryInput!, description: String!, email: String!, explicit: Boolean, imagePath: String!, title: String!, urlName: String!): Podcast!

  """Create a presigned URL for direct S3 upload."""
  createPresignedUploadUrl(contentType: String, fileName: String!, type: MediaType!): PresignedUpload!
  deleteComment(commentId: ID!): Episode!
  deleteEpisode(id: ID!): Podcast!
  deleteGuestStarring(id: ID!): Episode!
  followPodcast(podcastId: ID!): Podcast!
  markAllNotificationsAsRead: [Notification!]!

  """視聴者として存在を記録（ログイン不要・30秒ごとに呼ぶ）"""
  recordLiveStreamPresence(liveStreamUuid: String!): LiveStream!
  reportContent(reason: String, url: String!): ReportResult!
  saveFcmToken(input: SaveFcmTokenInput!): Boolean!

  """チャットメッセージを送信（ログイン必須）"""
  sendLiveStreamChatMessage(body: String!, liveStreamUuid: String!): LiveStreamChatMessage!
  toggleFollowPodcast(podcastId: ID!): Podcast!
  unfollowPodcast(podcastId: ID!): Podcast!

  """Update an existing podcast episode."""
  updateEpisode(
    """
    Path to the temporary audio file returned by uploadEpisodeMedia (provides new audio)
    """
    audioPath: String
    description: String
    episodeNumber: Int
    id: ID!

    """
    Path to the temporary image file returned by uploadEpisodeMedia (optional, provides new image)
    """
    imagePath: String
    normalizeLoudness: Boolean
    scheduledAt: String
    seasonNumber: Int
    starrings: [EpisodeStarringUpdateInput!]
    status: EpisodeStatus
    title: String!
    visibility: EpisodeVisibilityType!
  ): Episode!
  updateGuestStarring(guestName: String, id: ID!, imagePath: String, role: String, speakers: [Int!]): Episode!
  updatePlaybackPosition(episodeId: ID!, isCompleted: Boolean, position: Float!): Episode!
  updateUserPlaybackRate(newRate: Float!): User!
}

